{% extends "base.html" %}
{% block title %}Crear Capacitación{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><i class="bi bi-plus-circle"></i> Crear Capacitación</h4>
        <a href="{{ url_for('gestor.mis_capacitaciones') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card-custom">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="titulo" class="form-label fw-semibold">
                                Título de la Capacitación *
                            </label>
                            <input type="text" class="form-control" id="titulo"
                                   name="titulo" required placeholder="Ej: Seguridad Industrial">
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-semibold">
                                Descripción
                            </label>
                            <textarea class="form-control" id="descripcion" name="descripcion"
                                      rows="3" placeholder="Descripción del contenido..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Área</label>
                            <input type="text" class="form-control" disabled
                                   value="{{ gestor.area.nombre_area }}">
                            <small class="text-muted">
                                <i class="bi bi-info-circle"></i>
                                Se asigna automáticamente a su área.
                            </small>
                        </div>

                        <div class="mb-4">
                            <label for="material_link" class="form-label fw-semibold">
                                <i class="bi bi-link-45deg"></i> Material de Apoyo (Link)
                            </label>
                            <input type="url" class="form-control" id="material_link"
                                   name="material_link"
                                   placeholder="https://www.youtube.com/watch?v=... o URL de PDF">
                            <small class="text-muted">
                                Ingrese el enlace al video, PDF o recurso externo.
                            </small>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle"></i> Crear y Agregar Preguntas
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
